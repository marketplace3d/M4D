<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>M4D backtrader check</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #0d1117; color: #e6edf3; margin: 1rem; }
    a { color: #58a6ff; }
    code { background: #21262d; padding: 0.15rem 0.35rem; border-radius: 4px; }
    .card { max-width: 48rem; border: 1px solid #30363d; border-radius: 10px; background: #161b22; padding: 0.9rem 1rem; }
    .ok { color: #3fb950; }
    .err { color: #f85149; }
    table { width: 100%; border-collapse: collapse; margin-top: 0.7rem; }
    td { padding: 0.4rem 0.3rem; border-bottom: 1px solid #30363d; font-size: 0.92rem; }
    td:first-child { color: #8b949e; width: 40%; }
  </style>
</head>
<body>
  <p><a href="/">← home</a></p>
  <div class="card">
    <h1 style="margin: 0 0 0.4rem;">backtrader in Django</h1>
    {% if ok %}
      <p class="ok" style="margin: 0.2rem 0;">Installed and smoke run passed.</p>
      <p style="margin: 0.2rem 0;">Version: <code>{{ version }}</code></p>
      <table>
        {% for k, v in stats.items %}
          <tr><td>{{ k }}</td><td>{{ v }}</td></tr>
        {% endfor %}
      </table>
      <p style="font-size: 0.86rem; color: #8b949e; margin-top: 0.7rem;">
        Source framework: <a href="https://github.com/mementum/backtrader">mementum/backtrader</a>
      </p>
    {% else %}
      <p class="err" style="margin: 0.2rem 0;">Not ready.</p>
      <pre style="white-space: pre-wrap; background:#0b0f15; border:1px solid #30363d; padding:0.7rem;">{{ error }}</pre>
    {% endif %}
  </div>
</body>
</html>
