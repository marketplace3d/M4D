
<style>
  @keyframes orbit { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  .ring-spin { transform-origin: 340px 300px; animation: orbit 60s linear infinite; }
  .ring-spin-2 { transform-origin: 340px 300px; animation: orbit 90s linear infinite reverse; }
  .ring-spin-3 { transform-origin: 340px 300px; animation: orbit 130s linear infinite; }
  .dot { cursor:pointer; }
  .dot:hover circle { r: 9; }
  text { pointer-events: none; }
</style>
<svg width="100%" viewBox="0 0 680 620">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<circle cx="340" cy="300" r="80"  fill="none" stroke="var(--b)" stroke-width="0.5" opacity="0.3"/>
<circle cx="340" cy="300" r="150" fill="none" stroke="var(--b)" stroke-width="0.5" opacity="0.25"/>
<circle cx="340" cy="300" r="230" fill="none" stroke="var(--b)" stroke-width="0.5" opacity="0.2"/>

  <circle cx="340" cy="300" r="52" stroke-width="0.5"/>

<!-- RING 1 (r=80): conventional alt-data — close orbit -->
<g class="ring-spin">
  <g class="dot c-blue" onclick="sendPrompt('How do quantitative funds use credit card transaction data as trading signal? What does aggregated consumer spending reveal before earnings? How do you acquire, clean and normalise this data?')">
    <circle cx="340" cy="220" r="7" stroke-width="0.5"/>
  </g>
  <g class="dot c-blue" onclick="sendPrompt('How is options flow used as a leading indicator? What does unusual options activity, dark pool prints, and put/call ratio reveal about informed money positioning?')">
    <circle cx="420" cy="300" r="7" stroke-width="0.5"/>
  </g>
  <g class="dot c-blue" onclick="sendPrompt('Congressional trading data — STOCK Act disclosures. How do quant funds systematically mine politician trade filings for alpha? What is the documented edge and how has it decayed?')">
    <circle cx="340" cy="380" r="7" stroke-width="0.5"/>
  </g>
  <g class="dot c-blue" onclick="sendPrompt('Short interest and borrow cost data as signal. How does rising borrow cost predict squeeze events? How do you model the short float squeeze signal with entry/exit discipline?')">
    <circle cx="260" cy="300" r="7" stroke-width="0.5"/>
  </g>
</g>
