<g class="layer c-purple" onclick="sendPrompt('The RenTech signal discovery process: how do you systematically mine thousands of weak, decorrelated predictive signals from raw data? Cover: exhaustive feature generation, multiple-hypothesis testing with Bonferroni/FDR correction, minimum description length signal validation, avoiding data-snooping bias, out-of-sample holdout discipline, signal half-life measurement. This is the core moat — build the full spec.')">
  <rect x="30" y="104" width="620" height="72" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="128" text-anchor="middle" dominant-baseline="central">II. signal discovery engine</text>
  <text class="ts" x="340" y="148" text-anchor="middle" dominant-baseline="central">Exhaustive feature generation · FDR-corrected hypothesis testing</text>
  <text class="ts" x="340" y="164" text-anchor="middle" dominant-baseline="central">Thousands of weak signals · minimum description length · snooping controls</text>
</g>

<line x1="340" y1="176" x2="340" y2="200" class="arr" marker-end="url(#arrow)"/>

<g class="layer c-teal" onclick="sendPrompt('Design the signal library management system: the living database of active, probationary, retired, and seasonal signals. Each signal has: discovery date, in-sample IR, out-of-sample IR, current decay rate, regime sensitivity, capacity estimate, correlation to library. Build the signal lifecycle manager: promotion, demotion, retirement, revival logic. This is what separates RenTech from everyone — the library IS the fund.')">
  <rect x="30" y="202" width="620" height="72" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="226" text-anchor="middle" dominant-baseline="central">III. signal library — the actual moat</text>
  <text class="ts" x="340" y="246" text-anchor="middle" dominant-baseline="central">Thousands of live signals · each with decay tracking · capacity limits · regime tags</text>

</g>

<!-- ══ BLOCK 4: NON-STATIONARITY ENGINE ══ -->
<g class="layer c-blue" onclick="sendPrompt('Non-stationarity is the core unsolved problem in quantitative finance. Build the non-stationarity detection and adaptation engine: rolling regime change detection (CUSUM, Bayesian changepoint), signal decay measurement (rolling IR half-life), automatic signal weight reduction as decay detected, market microstructure change monitoring, crowding detection (when a signal is being traded by too many funds it dies). This is what Simons obsessed over.')">
  <rect x="30" y="300" width="620" height="72" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="324" text-anchor="middle" dominant-baseline="central">IV. non-stationarity &amp; decay engine</text>
  <text class="ts" x="340" y="344" text-anchor="middle" dominant-baseline="central">CUSUM changepoint · rolling IR half-life · crowding detector · microstructure monitor</text>
  <text class="ts" x="340" y="360" text-anchor="middle" dominant-baseline="central">When a signal starts dying — reduce, rotate, retire. Automatically. No discretion.</text>
</g>

<line x1="340" y1="372" x2="340" y2="396" class="arr" marker-end="url(#arrow)"/>

<!-- ══ BLOCK 5: EXECUTION AS ALPHA ══ -->
<g class="layer c-amber" onclick="sendPrompt('At RenTech scale execution IS alpha. Build the execution research system: Almgren-Chriss market impact model, optimal trade scheduling under impact constraints, crossing network and dark pool intelligence, adverse selection detection (are you being picked off?), intraday liquidity forecasting, short-sale availability and borrow cost optimisation, transaction cost model that feeds back into signal sizing. Execution research is as deep as signal research.')">
  <rect x="30" y="398" width="620" height="72" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="422" text-anchor="middle" dominant-baseline="central">V. execution as alpha</text>
  <text class="ts" x="340" y="442" text-anchor="middle" dominant-baseline="central">Market impact model · adverse selection detection · intraday liquidity forecast</text>
  <text class="ts" x="340" y="458" text-anchor="middle" dominant-baseline="central">Transaction cost feeds back into signal sizing — slippage kills paper alpha</text>
</g>

<line x1="340" y1="470" x2="340" y2="494" class="arr" marker-end="url(#arrow)"/>

<!-- ══ BLOCK 6: PORTFOLIO: CAPACITY-AWARE ══ -->
<g class="layer c-coral" onclick="sendPrompt('RenTech kept Medallion small deliberately — capacity discipline is a strategy. Build the capacity-aware portfolio engine: per-signal capacity estimation (at what AUM does this signal get arbitraged away?), aggregate fund capacity ceiling, position sizing under capacity + impact constraints, diversification across uncorrelated signal buckets, no single signal > X% of expected PnL, tail risk management without killing returns. This is why they returned capital instead of scaling.')">
  <rect x="30" y="496" width="620" height="72" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="520" text-anchor="middle" dominant-baseline="central">VI. capacity-aware portfolio construction</text>
  <text class="ts" x="340" y="540" text-anchor="middle" dominant-baseline="central">Per-signal capacity ceiling · fund AUM discipline · signal bucket diversification</text>
  <text class="ts" x="340" y="556" text-anchor="middle" dominant-baseline="central">No discretionary override. Ever. The system trades the system.</text>
</g>

<line x1="340" y1="568" x2="340" y2="592" class="arr" marker-end="url(#arrow)"/>
