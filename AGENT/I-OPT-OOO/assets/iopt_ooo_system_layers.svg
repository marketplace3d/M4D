<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" width="920" height="560" style="font-family:system-ui,-apple-system,sans-serif;background:#060d1a">
  <defs>
    <linearGradient id="gM3" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#0a2a5e"/><stop offset="100%" stop-color="#0d3a7a"/></linearGradient>
    <linearGradient id="gM4" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#2a0a4a"/><stop offset="100%" stop-color="#3d0d6e"/></linearGradient>
    <linearGradient id="gW4" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#0a3a1e"/><stop offset="100%" stop-color="#0d5228"/></linearGradient>
    <linearGradient id="gRisk" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#3a1a00"/><stop offset="100%" stop-color="#5a2800"/></linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#4a9eff"/></marker>
  </defs>

  <rect width="920" height="560" fill="#060d1a"/>
  <title>I-OPT-OOO system layers M3D M4D W4D</title>
  <desc>Static architecture: science stack, oracle UI, hard risk, operations grade.</desc>
  <text x="460" y="28" fill="#4a9eff" font-size="16" font-weight="bold" text-anchor="middle">I-OPT-OOO — System layers (M3D → M4D → W4D)</text>
  <text x="460" y="48" fill="#5a7a9e" font-size="11" text-anchor="middle">Governance / scale readiness · not a performance chart</text>

  <rect x="24" y="64" width="872" height="108" rx="8" fill="url(#gM3)" stroke="#1a4a8e" stroke-width="1"/>
  <text x="36" y="86" fill="#6ab4ff" font-size="12" font-weight="bold">M3D — Science stack</text>
  <text x="36" y="104" fill="#8ac4ff" font-size="10">Engine (5m loop) · algo_day.json / algo_state.db · Rust API · Blueprint site</text>
  <text x="36" y="122" fill="#6a8aae" font-size="10">Outputs: CouncilSnapshot · AlgoDay · assets · /ws/algo · /ws/scanner</text>
  <text x="36" y="142" fill="#4a7a9e" font-size="9">SSOT: council algos + models.rs / site types</text>
  <text x="36" y="158" fill="#3a6a8e" font-size="9">Trust order: spec → api models → frontend types</text>

  <line x1="460" y1="172" x2="460" y2="198" stroke="#4a9eff" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="24" y="198" width="872" height="100" rx="8" fill="url(#gM4)" stroke="#4a1a7e" stroke-width="1"/>
  <text x="36" y="220" fill="#c8a0ff" font-size="12" font-weight="bold">M4D — Human oracle layer</text>
  <text x="36" y="238" fill="#b8a0dd" font-size="10">MaxCogViz · council/regime UX · pulse · explainability · flatten / halt targets</text>
  <text x="36" y="256" fill="#9a80bb" font-size="10">Decision: observe → interpret → intent (not yet institutional OMS by itself)</text>
  <text x="36" y="276" fill="#7a6099" font-size="9">JEDI as continuous score; dissent / bear case surfaced in UI</text>

  <line x1="460" y1="298" x2="460" y2="318" stroke="#c8a0ff" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="24" y="318" width="872" height="56" rx="8" fill="url(#gRisk)" stroke="#6a4010" stroke-width="1"/>
  <text x="36" y="340" fill="#ffcc66" font-size="12" font-weight="bold">Hard risk gate (execution boundary)</text>
  <text x="36" y="358" fill="#ddaa55" font-size="10">Pre-trade limits · daily halt · kill switch · mandate checks — must block bad intents before broker</text>

  <line x1="460" y1="374" x2="460" y2="398" stroke="#ffaa44" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="24" y="398" width="872" height="120" rx="8" fill="url(#gW4)" stroke="#1a5a2e" stroke-width="1"/>
  <text x="36" y="420" fill="#5ae88a" font-size="12" font-weight="bold">W4D-grade — Operations &amp; books</text>
  <text x="36" y="438" fill="#8ae8aa" font-size="10">OMS state machine · broker adapters (paper → live) · fills → reconciliation → PnL/NAV</text>
  <text x="36" y="456" fill="#6aca8a" font-size="10">Audit trail · auth/RBAC · multi-account mandates · TCA / execution quality</text>
  <text x="36" y="476" fill="#4a9a6a" font-size="9">I-OPT-OOO master doc tracks gap analysis and 90-day program</text>
  <text x="36" y="494" fill="#3a8a5a" font-size="9">See: I-OPT-OOO-MASTER.MD · OPERATOR-RUNBOOK.MD</text>

  <text x="460" y="538" fill="#3a5a7e" font-size="10" text-anchor="middle">APP-DOC/I-OPT-OOO/assets/iopt_ooo_system_layers.svg</text>
</svg>
